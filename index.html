<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домашня їжа</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <h1>Домашня їжа</h1>
  <p class="slogan">Смак, який повертає в дитинство. Готуємо з любов'ю — для вас.</p>
</header>

<div class="container">
<div id="menu">

<!-- Приклад категорії -->
<div class="category">
  <button class="accordion">Пельмені / Вареники</button>
  <div class="panel">
    <div class="item">
      <span>Пельмені (курка та свинина) — 400 грн / 1кг</span>
      <input type="number" min="0.1" step="0.1" value="1" class="weight">
      <button class="add-btn" data-name="Пельмені (курка та свинина)" data-price="400">Додати</button>
    </div>
    <div class="item">
      <span>Пельмені (свинина та телятина) — 450 грн / 1кг</span>
      <input type="number" min="0.1" step="0.1" value="1" class="weight">
      <button class="add-btn" data-name="Пельмені (свинина та телятина)" data-price="450">Додати</button>
    </div>
    <div class="item">
      <span>Вареники з капустою — 150 грн / 1кг</span>
      <input type="number" min="0.1" step="0.1" value="1" class="weight">
      <button class="add-btn" data-name="Вареники з капустою" data-price="150">Додати</button>
    </div>
    <!-- Додати всі інші позиції по такому ж шаблону -->
  </div>
</div>

<!-- Додати інші категорії так само -->

</div>
</div>

<!-- Кошик -->
<div id="cart">
  <h3>Кошик</h3>
  <div id="cart-items"></div>
  <p>Сума: <span id="total">0</span> грн</p>
  <button id="order-btn">Замовити через Viber/Telegram</button>
</div>

<script src="cart.js"></script>
</body>
</html>

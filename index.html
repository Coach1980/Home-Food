<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Домашня кухня</title>

<link rel="stylesheet" href="style.css">

</head>
<body>


<header class="hero">

<div class="hero-content">

<h1>Домашня їжа</h1>

<p>
Справжня домашня кухня ❤️
</p>

<a href="#menu" class="hero-button">Меню</a>

</div>

</header>



<section id="menu" class="menu">

<h2>Меню</h2>

<div class="menu-grid">

<div class="menu-card" data-menu="pelmeni">
<img src="img/pelmeni.jpg">
<h3>Пельмені / Вареники</h3>
</div>

<div class="menu-card" data-menu="kotlety">
<img src="img/kotlety.jpg">
<h3>Котлети</h3>
</div>

<div class="menu-card" data-menu="salaty">
<img src="img/salaty.jpg">
<h3>Салати</h3>
</div>

<div class="menu-card" data-menu="chebureky">
<img src="img/chebureky.jpg">
<h3>Чебуреки</h3>
</div>

</div>

</section>



<div class="cart">

<div class="cart-icon">
🛒
<span id="cartBadge">0</span>
</div>

<h3>Кошик (<span id="count">0</span>)</h3>

<ul id="cart"></ul>

<p>Сума: <span id="sum">0</span> грн</p>

<div class="buttons">

<button onclick="clearCart()">Очистити</button>

<button onclick="openOrder()">Замовити</button>

</div>

</div>



<div id="orderPopup" class="popup">

<div class="popup-box">

<h2>Оформлення</h2>

<div id="orderList"></div>

<p>Сума: <span id="orderSum">0</span></p>

<input id="phone" placeholder="0631234567">

<button id="confirmBtn" disabled>
Підтвердити
</button>

<p id="okMsg"></p>

<button onclick="closeOrder()">Закрити</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
